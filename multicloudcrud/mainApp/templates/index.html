<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Tareas | Cloud App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #f0f2f5; 
            font-family: 'Inter', sans-serif;
        }
        .main-card { 
            max-width: 700px; 
            margin: 60px auto; 
            border: none;
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
        }
        .task-item {
            transition: all 0.3s ease;
            border-left: 6px solid #0d6efd;
            border-radius: 12px !important;
            margin-bottom: 12px;
        }
        .task-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .task-completed {
            border-left-color: #6c757d;
            background-color: #f8f9fa;
        }
        .completed-text {
            text-decoration: line-through;
            color: #adb5bd;
        }
        .btn-action {
            border-radius: 8px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card main-card">
        <div class="card-body p-4 p-md-5">
            <h1 class="text-center mb-4 fw-bold text-dark">📝 Gestión de Tareas</h1>
            
            <form method="POST" class="row g-3 mb-5 justify-content-center">
                {% csrf_token %}
                <div class="col-12">
                    <input type="text" name="titulo" class="form-control form-control-lg text-center" 
                           placeholder="¿Cuál es la nueva tarea?" required>
                </div>
                <div class="col-12">
                    <textarea name="descripcion" class="form-control text-center" rows="2" 
                              placeholder="Agrega una breve descripción..."></textarea>
                </div>
                <div class="col-md-6 d-grid">
                    <button type="submit" class="btn btn-primary btn-lg btn-action shadow-sm">Guardar Tarea</button>
                </div>
            </form>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold text-secondary mb-0">Listado de Actividades</h4>
                <span class="badge bg-primary rounded-pill">{{ tareas|length }} totales</span>
            </div>

            <div class="list-group">
                {% for tarea in tareas %}
                <div class="list-group-item d-flex justify-content-between align-items-center shadow-sm task-item {% if tarea.completada %}task-completed{% endif %}">
                    <div style="flex-grow: 1;" class="pe-3">
                        <h5 class="mb-1 fw-bold {% if tarea.completada %}completed-text{% else %}text-dark{% endif %}">
                            {{ tarea.titulo }}
                        </h5>
                        <p class="mb-0 text-muted small">{{ tarea.descripcion }}</p>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <a href="{% url 'completar' tarea.id %}" 
                           class="btn btn-sm btn-action {% if tarea.completada %}btn-outline-secondary{% else %}btn-outline-success{% endif %}">
                            {% if tarea.completada %}↩️{% else %}✔️{% endif %}
                        </a>
                        
                        <a href="{% url 'eliminar' tarea.id %}" 
                           class="btn btn-sm btn-outline-danger btn-action"
                           onclick="return confirm('¿Estás seguro de eliminar esta tarea?')">
                            🗑️
                        </a>
                    </div>
                </div>
                {% empty %}
                <div class="text-center py-5">
                    <img src="https://cdn-icons-png.flaticon.com/512/4076/4076549.png" width="80" class="mb-3 opacity-25">
                    <p class="text-muted fs-5">No hay tareas pendientes en la nube.</p>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
