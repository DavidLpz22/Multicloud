<!DOCTYPE html>
<html>
<head><title>CRUD Django - AWS RDS</title></head>
<body>
    <h1>Gestión de Tareas (RDS)</h1>
    <form method="POST">
        {% csrf_token %}
        <input type="text" name="titulo" placeholder="Título" required>
        <textarea name="descripcion" placeholder="Descripción"></textarea>
        <button type="submit">Guardar en RDS</button>
    </form>
    <hr>
    <ul>
        {% for tarea in tareas %}
            <li><strong>{{ tarea.titulo }}</strong>: {{ tarea.descripcion }}</li>
        {% endfor %}
    </ul>
</body>
</html>
