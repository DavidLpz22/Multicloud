<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Tareas - Cloud App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .main-card { max-width: 600px; margin: 50px auto; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-custom { background-color: #0d6efd; color: white; border-radius: 8px; }
        .list-group-item { border-left: 5px solid #0d6efd; margin-bottom: 10px; border-radius: 8px !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="card main-card border-0">
        <div class="card-body p-5">
            <h1 class="text-center mb-4 fw-bold">📝 Gestión de Tareas</h1>
            
            <form method="POST" class="mb-5">
                {% csrf_token %}
                <div class="mb-3">
                    <input type="text" name="titulo" class="form-control form-control-lg text-center" placeholder="¿Qué hay que hacer?" required>
                </div>
                <div class="mb-3">
                    <textarea name="descripcion" class="form-control text-center" rows="2" placeholder="Detalles de la tarea..."></textarea>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-custom btn-lg">Guardar Tarea</button>
                </div>
            </form>

            <hr class="my-4">

            <h4 class="mb-3 text-secondary text-center">Tareas Pendientes</h4>
            <div class="list-group">
                {% for tarea in tareas %}
                <div class="list-group-item list-group-item-action shadow-sm">
                    <div class="d-flex w-100 justify-content-between">
                        <h5 class="mb-1 fw-bold text-primary">{{ tarea.titulo }}</h5>
                    </div>
                    <p class="mb-1 text-muted">{{ tarea.descripcion }}</p>
                </div>
                {% empty %}
                <p class="text-center text-muted italic">No hay tareas guardadas aún.</p>
                {% endfor %}
            </div>
        </div>
    </div>
</div>

</body>
</html>
